name: brazil_ecommerce

profile: brazil_ecommerce

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"



models:
  brazil_ecommerce:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
