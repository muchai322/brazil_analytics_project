version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: order_date
        tests:
          - unique
          - not_null

  - name: fact_orders
    columns:
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

      - name: order_date
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: order_date

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null